name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.5.3)"
        required: true
        type: string

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.tag }}

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Extract version metadata
        id: meta
        run: |
          version="$(uv run python -c 'import shisad; print(shisad.__version__)')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package version
        run: |
          expected="v${{ steps.meta.outputs.version }}"
          if [ "${{ inputs.tag }}" != "${expected}" ]; then
            echo "::error::Tag '${{ inputs.tag }}' does not match package version '${expected}'"
            exit 1
          fi

      - name: Verify lockfile
        run: uv lock --check

      - name: Run release validation
        run: |
          uv sync --frozen --dev
          uv run ruff format --check .
          uv run ruff check .
          uv run pytest tests/ -q
          uv run pytest tests/behavioral/ -q

      - name: Remove stale build artifacts
        run: rm -rf dist/

      - name: Build
        run: uv build

      - name: Verify package metadata
        run: uvx --from twine twine check dist/*

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          artifact-name: sbom-shisad-${{ steps.meta.outputs.version }}
          output-file: dist/sbom-shisad-${{ steps.meta.outputs.version }}.spdx.json

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi-publish
    permissions:
      id-token: write
      contents: read
      attestations: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist/

      - name: Generate artifact attestations
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/shisad-*.whl

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
