name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      allow_regression_override:
        description: "Allow M6 adversarial regression findings for this run."
        required: false
        default: false
        type: boolean
  schedule:
    # 03:00 JST nightly
    - cron: "0 18 * * *"

permissions:
  contents: read

jobs:
  lint-and-test:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Verify lockfile is up to date
        run: uv lock --check

      - name: Install dependencies (default profile)
        run: uv sync --exclude-newer P7D --frozen --dev

      - name: Lint with ruff
        run: uv run ruff check src/ tests/ scripts/

      - name: Type check with mypy
        run: uv run mypy src/shisad/

      - name: Verify security asset provenance
        run: uv run python scripts/security_assets.py verify

      - name: Audit test files contain test functions
        run: uv run python scripts/test_function_audit.py --tests-root tests

      - name: Run tests
        run: uv run pytest -v -m "not requires_cap_net_admin"

  security-runtime:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies (security-runtime + coverage + channels-runtime)
        run: uv sync --exclude-newer P7D --frozen --dev --group security-runtime --group coverage --group channels-runtime

      - name: Verify security asset provenance
        run: uv run python scripts/security_assets.py verify

      - name: Run tests with coverage
        run: uv run pytest -m "not requires_cap_net_admin" --cov=src --cov-report=term-missing --cov-report=xml -q

      - name: Validate coverage baseline
        run: uv run python scripts/coverage_baseline.py --xml coverage.xml

      - name: Enforce per-module coverage floors
        run: uv run python scripts/coverage_module_gate.py --xml coverage.xml --critical-floor 80 --module-floor 60

      - name: Generate per-package coverage trend artifact
        run: uv run python scripts/coverage_trend.py --xml coverage.xml --output artifacts/coverage-trend.json

      - name: Generate TextGuard classifier metrics artifact
        run: uv run python scripts/yara_parity_report.py --output artifacts/yara-parity.json

      - name: Upload security runtime artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: security-runtime-artifacts
          path: |
            coverage.xml
            artifacts/coverage-trend.json
            artifacts/yara-parity.json

  privileged-connect-path:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies (default profile)
        run: uv sync --exclude-newer P7D --frozen --dev

      - name: Detect CAP_NET_ADMIN availability
        id: capcheck
        run: |
          available="$(uv run python -c 'from shisad.executors.connect_path import IptablesConnectPathProxy; print("true" if IptablesConnectPathProxy.detect_net_admin_capability() else "false")')"
          echo "available=${available}" >> "$GITHUB_OUTPUT"

      - name: Run privileged connect-path tests
        if: steps.capcheck.outputs.available == 'true'
        run: uv run pytest -v -m requires_cap_net_admin

      - name: Skip privileged connect-path tests
        if: steps.capcheck.outputs.available != 'true'
        run: echo "CAP_NET_ADMIN unavailable on this runner; skipping optional privileged lane."

  adversarial-pr-core:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      ALLOW_M6_REGRESSION: ${{ vars.ALLOW_M6_REGRESSION || 'false' }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies (default profile)
        run: uv sync --exclude-newer P7D --frozen --dev

      - name: Run deterministic core adversarial subset
        run: |
          uv run pytest -q \
            tests/adversarial/test_adversarial_hardening.py::test_m6_a1_prompt_injection_direct_fixture_matrix_has_50_plus_variants \
            tests/adversarial/test_adversarial_hardening.py::test_m6_t18_layered_mixed_encoding_fixture_matrix_is_deterministic_and_flagged \
            tests/adversarial/test_adversarial_hardening.py::test_m6_t9_staged_small_request_exfil_fixture_yields_block_reason_codes \
            tests/adversarial/test_adversarial_hardening.py::test_m6_t10_dns_exfil_simulation_is_flagged_or_blocked_with_deterministic_reason \
            tests/adversarial/test_adversarial_hardening.py::test_m6_t11_browser_exfil_attempt_cannot_bypass_policy_gate \
            tests/integration/test_security_hardening_integration.py::test_m6_t12_cross_thread_high_overlap_requires_confirmation_and_audit_metadata \
            tests/integration/test_security_hardening_integration.py::test_m6_t13_explicit_forward_intent_allows_warning_trail

      - name: Compute core adversarial metrics
        run: uv run python scripts/m6_adversarial_metrics.py --lane core --output artifacts/m6-core-metrics.json

      - name: Enforce core CI/regression/performance gates
        run: |
          allow_flag=""
          if [ "${ALLOW_M6_REGRESSION}" = "true" ]; then
            allow_flag="--allow-regression"
          fi
          uv run python scripts/m6_adversarial_gate.py \
            --metrics artifacts/m6-core-metrics.json \
            --baseline tests/adversarial/metrics_baseline.json \
            --lane core \
            --output artifacts/m6-core-gate.json \
            ${allow_flag}

      - name: Publish PR lane metrics summary
        run: |
          {
            echo "### M6 PR Adversarial Metrics (core lane)"
            echo '```json'
            cat artifacts/m6-core-metrics.json
            echo '```'
            echo ""
            echo "### M6 PR Gate Report"
            echo '```json'
            cat artifacts/m6-core-gate.json
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload PR lane adversarial artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: m6-pr-core-artifacts
          path: |
            artifacts/m6-core-metrics.json
            artifacts/m6-core-gate.json

  adversarial-nightly-full:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      ALLOW_M6_REGRESSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.allow_regression_override || 'false' }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies (default profile)
        run: uv sync --exclude-newer P7D --frozen --dev

      - name: Run full M6 adversarial suites
        run: uv run pytest -q tests/adversarial/test_adversarial_hardening.py tests/integration/test_security_hardening_integration.py

      - name: Compute full adversarial metrics
        run: uv run python scripts/m6_adversarial_metrics.py --lane full --output artifacts/m6-full-metrics.json

      - name: Enforce full CI/regression/performance gates
        run: |
          allow_flag=""
          if [ "${ALLOW_M6_REGRESSION}" = "true" ]; then
            allow_flag="--allow-regression"
          fi
          uv run python scripts/m6_adversarial_gate.py \
            --metrics artifacts/m6-full-metrics.json \
            --baseline tests/adversarial/metrics_baseline.json \
            --lane full \
            --output artifacts/m6-full-gate.json \
            ${allow_flag}

      - name: Publish nightly lane metrics summary
        run: |
          {
            echo "### M6 Nightly Adversarial Metrics (full lane)"
            echo '```json'
            cat artifacts/m6-full-metrics.json
            echo '```'
            echo ""
            echo "### M6 Nightly Gate Report"
            echo '```json'
            cat artifacts/m6-full-gate.json
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload nightly adversarial artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: m6-nightly-full-artifacts
          path: |
            artifacts/m6-full-metrics.json
            artifacts/m6-full-gate.json

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Dependency review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0

  zizmor:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Lint GitHub Actions workflows
        uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2
        with:
          version: v1.23.1
          advanced-security: false
