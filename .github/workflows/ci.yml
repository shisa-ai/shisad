name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies (default profile)
        run: uv sync --dev

      - name: Lint with ruff
        run: uv run ruff check src/ tests/

      - name: Type check with mypy
        run: uv run mypy src/shisad/

      - name: Verify security asset provenance
        run: uv run python scripts/security_assets.py verify

      - name: Run tests
        run: uv run pytest -v -m "not requires_cap_net_admin"

  security-runtime:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies (security-runtime + coverage + channels-runtime)
        run: uv sync --dev --group security-runtime --group coverage --group channels-runtime

      - name: Verify security asset provenance
        run: uv run python scripts/security_assets.py verify

      - name: Run tests with coverage
        run: uv run pytest -m "not requires_cap_net_admin" --cov=src --cov-report=term-missing --cov-report=xml -q

      - name: Validate coverage baseline
        run: uv run python scripts/coverage_baseline.py --xml coverage.xml

      - name: Generate per-package coverage trend artifact
        run: uv run python scripts/coverage_trend.py --xml coverage.xml --output artifacts/coverage-trend.json

      - name: Generate YARA parity metrics artifact
        run: uv run python scripts/yara_parity_report.py --output artifacts/yara-parity.json

      - name: Upload security runtime artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-runtime-artifacts
          path: |
            coverage.xml
            artifacts/coverage-trend.json
            artifacts/yara-parity.json

  privileged-connect-path:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies (default profile)
        run: uv sync --dev

      - name: Detect CAP_NET_ADMIN availability
        id: capcheck
        run: |
          available="$(uv run python -c 'from shisad.executors.connect_path import IptablesConnectPathProxy; print("true" if IptablesConnectPathProxy.detect_net_admin_capability() else "false")')"
          echo "available=${available}" >> "$GITHUB_OUTPUT"

      - name: Run privileged connect-path tests
        if: steps.capcheck.outputs.available == 'true'
        run: uv run pytest -v -m requires_cap_net_admin

      - name: Skip privileged connect-path tests
        if: steps.capcheck.outputs.available != 'true'
        run: echo "CAP_NET_ADMIN unavailable on this runner; skipping optional privileged lane."
