name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies (default profile)
        run: uv sync --dev

      - name: Lint with ruff
        run: uv run ruff check src/ tests/

      - name: Type check with mypy
        run: uv run mypy src/shisad/

      - name: Verify security asset provenance
        run: uv run python scripts/security_assets.py verify

      - name: Run tests
        run: uv run pytest -v

  security-runtime:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies (security-runtime + coverage + channels-runtime)
        run: uv sync --dev --group security-runtime --group coverage --group channels-runtime

      - name: Verify security asset provenance
        run: uv run python scripts/security_assets.py verify

      - name: Run tests with coverage
        run: uv run pytest --cov=src --cov-report=term-missing --cov-report=xml -q

      - name: Validate coverage baseline
        run: uv run python scripts/coverage_baseline.py --xml coverage.xml
