# Default development policy for the runner harness.
#
# This file is the single source of truth for the bootstrap policy.
# runner/harness.sh copies it to SHISAD_POLICY_PATH when no policy file exists.
#
# For production / operator deployments, create a purpose-built policy
# at the configured SHISAD_POLICY_PATH instead.

version: "1"
default_deny: false
# default_require_confirmation applies to tools that do NOT set their own
# `require_confirmation`. It is a floor, not a ceiling: per-tool
# `require_confirmation: true` still requires confirmation when this default
# is false.
#
# Trusted-CLI explicit-allow precedence:
#   Per-tool `require_confirmation: true` queues a confirmation by default.
#   However, when the trusted CLI/TUI operator's current-turn natural-language
#   intent deterministically names the action (see
#   `test_action_monitor_allows_explicit_todo_create_with_follow_on_commands`
#   and the `action_monitor:trusted_cli_current_turn_intent` reason code), the
#   ActionMonitor intentionally allows the tool call in the same turn without
#   re-queueing a confirmation. This is the *operator owns intent* principle
#   from `docs/DESIGN-PHILOSOPHY.md`: an authenticated operator typing their
#   own action on the trusted surface has already expressed consent.
#   Non-trusted channels (Discord/Matrix/Slack, subagents, untrusted evidence)
#   do not take this path and still queue the confirmation.
default_require_confirmation: false

content_firewall:
  semantic_classifier:
    # Intentionally surfaces "unavailable" on a fresh dev runner until the
    # operator points this at a local PromptGuard ONNX artifact or signed pack.
    posture: best_effort
    model_path: ""

default_capabilities:
  - file.read
  - file.write
  - http.request
  - email.read
  - memory.read
  - memory.write
  - message.send
  - shell.exec

tools:
  report_anomaly: {}
  web.search:
    capabilities_required:
      - http.request
  web.fetch:
    capabilities_required:
      - http.request
  attachment.ingest:
    capabilities_required:
      - file.read
      - memory.write
  fs.list:
    capabilities_required:
      - file.read
  fs.read:
    capabilities_required:
      - file.read
  fs.write:
    capabilities_required:
      - file.write
    require_confirmation: true
  git.status:
    capabilities_required:
      - file.read
  git.diff:
    capabilities_required:
      - file.read
  git.log:
    capabilities_required:
      - file.read
  note.create:
    capabilities_required:
      - memory.write
  note.list:
    capabilities_required:
      - memory.read
  note.search:
    capabilities_required:
      - memory.read
  todo.create:
    capabilities_required:
      - memory.write
  todo.list:
    capabilities_required:
      - memory.read
  todo.complete:
    capabilities_required:
      - memory.write
  reminder.create:
    capabilities_required:
      - memory.write
      - message.send
  reminder.list:
    capabilities_required:
      - memory.read
  message.send:
    capabilities_required:
      - message.send
